<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- PWA 支持 -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D97706" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#D97706" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#B45309" />
    
    <!-- iOS Safari 全屏支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AI创作" />
    
    <!-- iOS 桌面图标（不同尺寸） -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    
    <!-- iOS 启动画面（可选） -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-splash.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash/iphone-plus-splash.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- 标准图标 -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- TODO: Set the document title to the name of your application -->
    <title>Lovable App</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- 资源预连接 -->
    <link rel="dns-prefetch" href="https://kzdjqqinkonqlclbwleh.supabase.co" />
    <link rel="preconnect" href="https://kzdjqqinkonqlclbwleh.supabase.co" crossorigin />

    <!-- Google Fonts: 非阻塞加载 + 精简字重 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=DM+Serif+Display&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
    </noscript>

    <!-- 内联关键 CSS：首次绘制不依赖外部 CSS -->
    <style>
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',sans-serif;background:#FDFBF8;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh;min-height:100dvh}
      .app-shell{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
      @keyframes spinner{to{transform:rotate(360deg)}}
      .animate-spin-slow{animation:spinner 1.2s linear infinite}
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
