<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="620" viewBox="0 0 1680 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7fb"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
    <style>
      .title { font: 700 34px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #c7d2fe; stroke-width: 2; rx: 16; }
      .label { font: 600 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; fill: #1f2937; }
      .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .chip { font: 600 18px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect x="0" y="0" width="1680" height="620" fill="url(#bg)"/>
  <text class="title" x="80" y="80">平铺/摆拍生成 - 架构流程图</text>
  <rect x="80" y="106" width="248" height="38" rx="19" fill="#e0e7ff"/>
  <text class="chip" x="104" y="132">用户流程 + 服务流程</text>

  <rect class="box" x="80" y="220" width="260" height="170" />
  <rect class="box" x="390" y="220" width="260" height="170" />
  <rect class="box" x="700" y="220" width="260" height="170" />
  <rect class="box" x="1010" y="220" width="260" height="170" />
  <rect class="box" x="1320" y="220" width="260" height="170" />

  <text class="label" x="110" y="300">上传服装参考</text>
  <text class="label" x="420" y="300">选择平铺摆拍</text>
  <text class="label" x="730" y="300">组装风格Prompt</text>
  <text class="label" x="1040" y="300">AI生成效果图</text>
  <text class="label" x="1350" y="300">保存并下载</text>

  <path class="arrow" d="M340 305 L385 305"/>
  <path class="arrow" d="M650 305 L695 305"/>
  <path class="arrow" d="M960 305 L1005 305"/>
  <path class="arrow" d="M1270 305 L1315 305"/>
</svg>
