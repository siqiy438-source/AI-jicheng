<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>离线 - AI 创作平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #FDFBF8 0%, #F5F1EA 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      color: #282521;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    p {
      font-size: 16px;
      color: #6B6560;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    button {
      background: linear-gradient(135deg, #D97706 0%, #EA8C1F 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(217, 119, 6, 0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(217, 119, 6, 0.3);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>网络连接已断开</h1>
    <p>请检查您的网络连接，然后重试。部分已缓存的内容仍可离线访问。</p>
    <button onclick="window.location.reload()">重新加载</button>
  </div>
</body>
</html>
